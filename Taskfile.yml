version: "3"

tasks:
  build:
    desc: Build the weft binary
    cmds:
      - go build ./...

  install:
    desc: Build weft (version stamped from jj) and install to ~/.local/bin
    env:
      CGO_ENABLED: "0"
    vars:
      # Version is derived from jj, NOT git: a jj workspace has no .git (so
      # `git describe` fatals with "not a git repository"), and a colocated
      # repo's git HEAD is usually detached (so branch-based derivation is
      # empty). jj works in every workspace. The suffixed dev string
      # deliberately fails internal/install.semverPattern, so an installed dev
      # build never floats a release pin (see internal/cli/version.go).
      VERSION:
        sh: |
          base=$(jj log --no-graph -r @- -T 'commit_id.short(12)' 2>/dev/null)
          if [ -z "$base" ]; then
            echo "0.0.0-dev"
          else
            dirty=""
            [ "$(jj log --no-graph -r @ -T 'empty' 2>/dev/null)" = "false" ] && dirty="-dirty"
            echo "0.0.0-dev+g${base}${dirty}"
          fi
    cmds:
      - mkdir -p "$HOME/.local/bin"
      - go build -trimpath -ldflags '-s -w -X github.com/seanb4t/weft/internal/cli.Version={{.VERSION}}' -o "$HOME/.local/bin/weft" ./cmd/weft
      - 'echo "installed weft {{.VERSION}} -> $HOME/.local/bin/weft"'

  test:
    desc: Run the test suite
    cmds:
      - go test ./...

  validate:
    desc: Strict-validate the plugin and marketplace manifests
    cmds:
      - claude plugin validate ./plugin --strict
      - claude plugin validate . --strict

  snapshot:
    desc: Build a local snapshot release (no publish)
    cmds:
      - goreleaser release --snapshot --clean

  check:
    desc: Validate the GoReleaser config
    cmds:
      - goreleaser check

  release:preview:
    desc: Show the open release-please PR (or note none open)
    cmds:
      # `set -e` so a non-zero gh exit (auth/network) propagates instead of being
      # masked as "none": gh returns 0 with "[]" for a genuinely empty list, so
      # the "no open release PR" message is gated on that empty result alone.
      - |
        set -e
        prs=$(gh pr list --search "chore(main): release" --state open --json number,title)
        if [ "$prs" = "[]" ]; then
          echo "no open release PR"
        else
          echo "$prs"
        fi
