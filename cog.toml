# Cocogitto configuration
# https://docs.cocogitto.io/
#
# cog is the release engine: it derives the next semver from conventional
# commits and creates a TAG ONLY (no bump commit, no in-repo CHANGELOG.md).
# GitHub Release notes are generated by GoReleaser. Conventional-commit
# validation is enforced in CI on PR titles. There is no local commit-msg hook
# (jj does not fire git hooks reliably; CI is authoritative).

# v-prefixed tags (v1.2.3) to match GoReleaser.
tag_prefix = "v"

# Tag-only releases: no in-repo CHANGELOG.md (no commit to protected main).
disable_changelog = true

# Only allow a bump from main, so a stray dispatch from a feature branch
# cannot cut a release.
branch_whitelist = ["main"]

ignore_merge_commits = true

# Add `deps` as an allowed type so dependency-bot prefixes pass the
# commit-lint PR-title gate. Non-empty table (NOT `{}`) so it ADDS the type
# without disabling it; no bump_* keys so dep bumps never trigger a release.
[commit_types]
deps = { omit_from_changelog = true }
