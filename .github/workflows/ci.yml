name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go test ./...
      # Enforce go.mod/go.sum tidiness here (not via a GoReleaser release hook):
      # release builds must use the exact tagged module files (ADR weft-19y).
      - name: go.mod tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          # Exact pin (not the floating "~> v2" range), kept in lockstep with
          # release.yml. This `check` step itself is read-only (contents:read);
          # pinning here means CI validates the config against the exact GoReleaser
          # version the release job ships with. Bump deliberately.
          version: "2.16.0"
          args: check

  plugin-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      # claude.ai/install.sh returns HTTP 403 in CI behind Cloudflare
      # (anthropics/claude-code#36306); the npm package is the CI-safe install.
      # Pinned for reproducible CI / supply-chain safety — bump deliberately.
      - run: npm install -g @anthropic-ai/claude-code@2.1.183
      - run: claude plugin validate ./plugin --strict
      - run: claude plugin validate . --strict
      # ${CLAUDE_PLUGIN_ROOT} discipline: no stale weft/ intra-tree paths in the
      # installed plugin tree (the weft/ tree does not exist in the plugin cache).
      - name: grep-discipline
        run: |
          if grep -RnE 'weft/(agents|references|workflows)/' plugin/; then
            echo "::error::stale weft/ intra-tree path in plugin/ (use \${CLAUDE_PLUGIN_ROOT})"
            exit 1
          fi

  hooks-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      # The weft plugin ships a stdlib-only Python SessionStart hook
      # (plugin/hooks/; python3 shebang, uv-compatible via PEP 723 metadata).
      # This job is the "session-start smoke check": it runs the hook's unit +
      # subprocess tests — detection, silence, graceful bd-degradation, and live
      # warp-status formatting via a hermetic fake `bd` (no real warp needed). uv
      # here just provisions a throwaway python+pytest env for the test runner.
      # Pinned for supply-chain safety — bump deliberately; Renovate tracks the SHA.
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: uv run --python 3.12 --with pytest python -m pytest plugin/hooks/tests -q

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      # Exact pin (v1.0.5): the integration test is the drift sentinel for
      # weft's GraphJSON payload against the live bd graph schema. Bump
      # deliberately — bumping re-validates GraphJSON against the new bd
      # schema, which is the whole point of the sentinel. Renovate tracks
      # BD_VERSION (github-releases customManager in renovate.json) and opens
      # a bump PR when a newer bd release ships.
      - name: Install bd (pinned, checksum-verified)
        run: |
          set -euo pipefail
          BD_VERSION=1.0.5
          # BD_SHA256 is the linux_amd64 tarball hash for the pinned BD_VERSION.
          # Renovate bumps BD_VERSION but cannot recompute this hash, so on any
          # bump recompute it — the sha256sum -c check below fails closed until
          # then:  curl -fsSL "$url" | sha256sum
          BD_SHA256=24706f65c7131c7b3261388709ae8781c8db53f0795398f67aa40538750aacf3
          url="https://github.com/gastownhall/beads/releases/download/v${BD_VERSION}/beads_${BD_VERSION}_linux_amd64.tar.gz"
          curl -fsSL -o bd.tar.gz "$url"
          echo "${BD_SHA256}  bd.tar.gz" | sha256sum -c -
          mkdir -p "$HOME/.local/bin"
          tar -xzf bd.tar.gz -C "$HOME/.local/bin" bd
          rm -f bd.tar.gz
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      # jj is required by the weave end-to-end gate (internal/weave): the test
      # drives the real `weft` binary against real jj workspaces. Pinned +
      # checksum-verified, mirroring the bd step's supply-chain discipline.
      # Renovate tracks JJ_VERSION (github-releases customManager in
      # renovate.json); JJ_SHA256 is not auto-bumped (Renovate cannot recompute
      # a tarball hash) — the sha256sum -c check fails closed until it is
      # recomputed for the new version.
      - name: Install jj (pinned, checksum-verified)
        run: |
          set -euo pipefail
          JJ_VERSION=0.42.0
          JJ_SHA256=2d91e81d649e617a81608e7401ad1106029c15ece01ac928c4a351abef42be6a
          url="https://github.com/jj-vcs/jj/releases/download/v${JJ_VERSION}/jj-v${JJ_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          curl -fsSL -o jj.tar.gz "$url"
          echo "${JJ_SHA256}  jj.tar.gz" | sha256sum -c -
          mkdir -p "$HOME/.local/bin"
          # jj's musl tarball stores the binary as ./jj (leading ./). GNU tar on
          # the CI runner won't match a bare "jj" member (unlike BSD/macOS tar,
          # and unlike the bd archive which stores bd at the root) — use ./jj.
          tar -xzf jj.tar.gz -C "$HOME/.local/bin" ./jj
          rm -f jj.tar.gz
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: "Integration tests (live bd + jj: plan drift sentinel + weave E2E)"
        run: |
          set -euo pipefail
          bd --version
          jj --version
          WS="$(mktemp -d)"
          ( cd "$WS" && bd init --non-interactive -p weftci )
          BEADS_DIR="$WS/.beads" go test -tags integration ./internal/plan/ ./internal/weave/

  commit-lint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read  # action-semantic-pull-request reads PR metadata via GITHUB_TOKEN
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
