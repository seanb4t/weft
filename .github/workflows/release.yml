name: release

on:
  push:
    branches: [main]

# The release-please GitHub App token (minted below) performs every write —
# release PR, tag, GitHub Release, artifact upload — and is the named bypass
# actor on the protect-main ruleset. The default GITHUB_TOKEN only needs read.
permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      # Build + upload the binary only when a release was just created — check
      # out AT THE TAG release-please cut (not the triggering main HEAD).
      - if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ steps.release.outputs.tag_name }}
          fetch-depth: 0
      - if: ${{ steps.release.outputs.release_created }}
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - if: ${{ steps.release.outputs.release_created }}
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          # Exact pin (not the floating "~> v2" range): this step runs with
          # contents:write via the app token, so the GoReleaser toolchain version
          # is part of the supply chain. Bump deliberately (lockstep with ci.yml).
          version: "2.16.0"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
